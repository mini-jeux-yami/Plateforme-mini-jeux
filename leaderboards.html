<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade - Classements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .leaderboards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 30px; }
        .game-leaderboard-card { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(10, 200, 185, 0.3); border-radius: 12px; padding: 20px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); }
        .game-leaderboard-card h3 { border-bottom: 1px solid rgba(255, 0, 234, 0.2); padding-bottom: 15px; margin-bottom: 15px; font-size: 20px; text-align: center; }
        .game-title-link { color: #ff00ea; text-decoration: none; transition: color 0.3s; }
        .game-title-link:hover { color: #0ac8b9; text-shadow: 0 0 10px rgba(10, 200, 185, 0.5); }
        .game-leaderboard-card ul { list-style: none; padding: 0; margin: 0; }
        .game-leaderboard-card li { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 16px; }
        .game-leaderboard-card li:last-child { border-bottom: none; }
        .game-leaderboard-card li:nth-child(1) { background: rgba(200, 155, 60, 0.15); border-radius: 8px; color: #c89b3c; font-weight: bold; border: 1px solid rgba(200, 155, 60, 0.3); }
        .player-info { display: flex; align-items: center; }
        .rank-medal { width: 25px; text-align: center; margin-right: 10px; color: #94a3b8; }
        .score-value { color: #0ac8b9; font-weight: bold; font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body>
    <div class="grid-3d"></div>

    <div id="app-container" style="max-width: 1000px;">
        <div class="logo-box"><i class="fa-solid fa-trophy"></i> TEMPLE DE LA RENOMMÉE</div>
        <p class="instruction">Les champions en titre par mini-jeu.</p>
        
        <div class="divider"></div>

        <div id="leaderboards-container" class="leaderboards-grid">
            <p style="grid-column: 1 / -1;"><i class="fa-solid fa-spinner fa-spin"></i> Chargement des archives...</p>
        </div>

        <div class="divider" style="margin-top: 40px;"></div>
        <a href="/" class="btn-primary" style="display: inline-block; text-decoration: none; width: auto;"><i class="fa-solid fa-arrow-left"></i> Retour au Hub Central</a>
    </div>

    <script>
        async function loadLeaderboards() {
            try {
                const response = await fetch('/api/leaderboards');
                const result = await response.json();
                
                const container = document.getElementById('leaderboards-container');
                container.innerHTML = ''; 

                if (!result.success || result.data.length === 0) {
                    container.innerHTML = '<p style="grid-column: 1 / -1;">Aucune victoire enregistrée pour le moment. Allez jouer !</p>';
                    return;
                }

                const gamesData = {};
                result.data.forEach(row => {
                    if (!gamesData[row.game_name]) gamesData[row.game_name] = [];
                    gamesData[row.game_name].push(row);
                });

                for (const [gameName, scores] of Object.entries(gamesData)) {
                    // On trie par nombre de victoires
                    scores.sort((a, b) => b.wins - a.wins);
                    
                    // On récupère le lien du jeu (stocké dans la première ligne trouvée)
                    let gameUrl = scores[0].game_url;

                    let cardHTML = `
                        <div class="game-leaderboard-card">
                            <h3><a href="${gameUrl}" class="game-title-link"><i class="fa-solid fa-gamepad"></i> ${gameName}</a></h3>
                            <ul>
                    `;
                    
                    scores.forEach((s, index) => {
                        let rankDisplay = index === 0 ? '<i class="fa-solid fa-medal" style="color: gold;"></i>' : `#${index + 1}`;
                        cardHTML += `
                            <li>
                                <div class="player-info">
                                    <span class="rank-medal">${rankDisplay}</span>
                                    <img src="${s.profile_pic || '/asset/default.png'}" class="avatar-small" onerror="this.onerror=null; this.src='/asset/default.png';"> 
                                    ${s.username}
                                </div>
                                <span class="score-value">${s.wins} Victoire(s)</span>
                            </li>`;
                    });

                    cardHTML += `</ul></div>`;
                    container.innerHTML += cardHTML;
                }
            } catch (err) {
                console.error("Erreur de chargement :", err);
                document.getElementById('leaderboards-container').innerHTML = '<p style="color: red;">Erreur de connexion aux archives.</p>';
            }
        }
        
        loadLeaderboards();
    </script>
</body>
</html>
