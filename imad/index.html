<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace d'Imad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="grid-3d"></div>

    <div id="app-container">
        
        <div class="logo-box" style="font-size: 30px;"><i class="fa-solid fa-user-secret"></i> ESPACE D'IMAD</div>
        <p class="instruction">Sélectionnez le jeu auquel vous souhaitez jouer :</p>

        <div class="divider"></div>

        <div class="games-grid">
            
            <a href="/imad/cartel.html" class="game-card">
                <i class="fa-solid fa-skull"></i>
                <h4>El Cartel</h4>
                <p>Gestion, bluff et trahisons (3v1)</p>
            </a>

        </div>

        <div class="divider"></div>
        <a href="/" class="btn-text" style="text-decoration:none; display:inline-block;"><i class="fa-solid fa-arrow-left"></i> Retour à l'Arcade Centrale</a>
    </div>

    <script>
        fetch('/api/me')
            .then(res => res.json())
            .then(data => {
                if (!data.loggedIn) {
                    window.location.href = '/';
                }
            })
            .catch(err => {
                window.location.href = '/';
            });
    </script>
</body>
</html>
