<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <rect width="400" height="520" fill="#f0ece0"/>
  <!-- Cadre musée brun -->
  <rect x="20" y="20" width="360" height="480" fill="none" stroke="#8b6914" stroke-width="12"/>
  <rect x="26" y="26" width="348" height="468" fill="none" stroke="#c8a830" stroke-width="3"/>
  <rect x="30" y="30" width="340" height="460" fill="#f8f4e8"/>
  <!-- Pipe dessinée au crayon/huile -->
  <!-- Fourneau de la pipe -->
  <ellipse cx="240" cy="235" rx="52" ry="65" fill="none" stroke="#4a3020" stroke-width="4"/>
  <ellipse cx="240" cy="235" rx="45" ry="58" fill="none" stroke="#4a3020" stroke-width="2"/>
  <!-- Intérieur du fourneau (ombre) -->
  <ellipse cx="240" cy="215" rx="38" ry="40" fill="#2a1808" opacity="0.6"/>
  <ellipse cx="240" cy="235" rx="42" ry="55" fill="#6b4020"/>
  <ellipse cx="240" cy="235" rx="38" ry="50" fill="#7a4d28"/>
  <!-- Bague de raccord -->
  <rect x="190" y="285" width="105" height="18" rx="4" fill="#4a3020"/>
  <rect x="195" y="289" width="95" height="10" rx="3" fill="#6b4525"/>
  <!-- Tuyau -->
  <path d="M188 295 C170 310 130 320 80 305 C55 298 42 285 42 275" fill="none" stroke="#4a3020" stroke-width="18" stroke-linecap="round"/>
  <path d="M188 295 C170 310 130 320 80 305 C55 298 42 285 42 275" fill="none" stroke="#7a5535" stroke-width="12" stroke-linecap="round"/>
  <!-- Embout buccal -->
  <ellipse cx="42" cy="272" rx="9" ry="16" fill="#2a1808" transform="rotate(-15,42,272)"/>
  <ellipse cx="42" cy="272" rx="6" ry="11" fill="#1a0a00" transform="rotate(-15,42,272)"/>
  <!-- Ombre portée pipe -->
  <path d="M180 308 C160 322 120 330 75 318" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="8" stroke-linecap="round"/>
  <!-- Texte emblématique Magritte -->
  <text x="200" y="390" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, serif" font-size="26" fill="#2a2018" text-anchor="middle" font-style="italic">Ceci n'est pas une pipe.</text>
  <!-- Ligne décorative sous le texte -->
  <line x1="70" y1="405" x2="330" y2="405" stroke="#8b6914" stroke-width="1" opacity="0.4"/>
  <!-- Légende -->
  <text x="200" y="500" font-family="Georgia, serif" font-size="11" fill="#666" text-anchor="middle" font-style="italic">La Trahison des images — R. Magritte, 1929</text>
</svg>
