<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#713f12"/>
      <stop offset="50%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#713f12"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#1c1917"/>
  <g transform="translate(200 150) rotate(-25)">
    <!-- corps du violon -->
    <path d="M 0 -95 Q 25 -95 30 -65 Q 35 -40 30 -20 Q 45 -10 45 15 Q 45 45 25 55 Q 35 70 25 85 Q 0 95 -25 85 Q -35 70 -25 55 Q -45 45 -45 15 Q -45 -10 -30 -20 Q -35 -40 -30 -65 Q -25 -95 0 -95 Z"
          fill="url(#wood)" stroke="#3f1d06" stroke-width="2"/>
    <!-- cordes -->
    <g stroke="#fde68a" stroke-width="0.6">
      <line x1="-6" y1="-90" x2="-6" y2="85"/>
      <line x1="-2" y1="-90" x2="-2" y2="85"/>
      <line x1="2" y1="-90" x2="2" y2="85"/>
      <line x1="6" y1="-90" x2="6" y2="85"/>
    </g>
    <!-- f-holes -->
    <path d="M -15 0 Q -10 15 -15 25" fill="none" stroke="#1c1917" stroke-width="2"/>
    <path d="M 15 0 Q 10 15 15 25" fill="none" stroke="#1c1917" stroke-width="2"/>
    <!-- manche -->
    <rect x="-8" y="-120" width="16" height="35" fill="#3f1d06"/>
  </g>
  <text x="200" y="275" text-anchor="middle" font-family="Georgia, serif"
        font-size="20" font-weight="700" fill="#fde68a">Violon ancien</text>
</svg>
